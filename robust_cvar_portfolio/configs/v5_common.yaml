# V5 shared protocol: validation-calibrated state-dependent RCVaR
validation:
  start: "2018-01-01"
  end: "2019-12-31"

test:
  start: "2020-01-01"
  end: "2024-12-31"

kappa_max_grid: [0.25, 0.5, 0.75, 1.0, 1.25, 1.5]
weight_cap_grid: [0.05, 0.08, 0.10, null]
rho_grid: [0.5, 0.7, 0.9, null]

selection_objective:
  lambda_turnover: 0.001
  lambda_hhi: 0.01

constraints:
  long_only: true
  fully_invested: true

datasets: [etf10, etf20, sp30, sp100]
