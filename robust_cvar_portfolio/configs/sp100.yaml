# SP100: S&P 500 大型股 100 只（Version A，当前成分回填，论文需注明 survivorship bias）
dataset: sp100
target_n: 100
benchmark_ticker: SPY
# 候选池见 data/sp100_universe.py；也可在此覆盖 tickers 列表
tickers: []  # empty => use SP100_CANDIDATES in sp100_universe.py
start_date: "2010-01-01"
end_date: "2024-12-31"
min_history_days: 1500
splits:
  train: ["2010-01-01", "2017-12-31"]
  val: ["2018-01-01", "2019-12-31"]
  test: ["2020-01-01", "2024-12-31"]
alpha: 0.05
kappa_max: 1.0
fixed_kappa: 2.0
cost_rate: 0.001
estimation_window: 252
optimizer_maxiter: 50
beta_vol: 1.0
beta_dd: 1.0
beta_mom: 0.5
beta_corr: 0.5
beta_conc: 0.5
bootstrap_n: 500
bootstrap_block: 20
mv_risk_aversion: 2.0
